<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>.d{font-family:system-ui,'Segoe UI',Arial,sans-serif}</style>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#08150f"/>
  <stop offset="0.5" stop-color="#0a1e15"/>
  <stop offset="1" stop-color="#0c281b"/>
</linearGradient>
<radialGradient id="glow" cx="0.5" cy="0.6" r="0.42">
  <stop offset="0" stop-color="#1fbf6a" stop-opacity="0.42"/>
  <stop offset="1" stop-color="#1fbf6a" stop-opacity="0"/>
</radialGradient>
<linearGradient id="price" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#34e6d6"/>
  <stop offset="1" stop-color="#38e08c"/>
</linearGradient>
<linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#27d15f"/>
  <stop offset="1" stop-color="#12933f"/>
</linearGradient>
<clipPath id="card"><rect x="6" y="6" width="1428" height="888" rx="34"/></clipPath>
<pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
  <circle cx="3" cy="3" r="2.4" fill="#3be39a" opacity="0.5"/>
</pattern>
</defs>

<g clip-path="url(#card)">
  <rect x="6" y="6" width="1428" height="888" fill="url(#bg)"/>
  <!-- diagonal light streaks -->
  <g opacity="0.55">
    <polygon points="360,-40 470,-40 250,940 140,940" fill="#ffffff" opacity="0.018"/>
    <polygon points="620,-40 690,-40 470,940 400,940" fill="#ffffff" opacity="0.025"/>
    <polygon points="980,-40 1080,-40 860,940 760,940" fill="#ffffff" opacity="0.018"/>
    <polygon points="1230,-40 1290,-40 1070,940 1010,940" fill="#ffffff" opacity="0.02"/>
  </g>
  <!-- dotted texture corners -->
  <rect x="1140" y="30" width="300" height="180" fill="url(#dots)" opacity="0.35"/>
  <rect x="0" y="690" width="300" height="200" fill="url(#dots)" opacity="0.3"/>
  <!-- center glow -->
  <rect x="6" y="6" width="1428" height="888" fill="url(#glow)"/>
  <!-- bottom sweeping wave -->
  <path d="M-20 880 C 480 700 980 900 1460 720" fill="none" stroke="#2ea86a" stroke-width="2.5" opacity="0.5"/>
  <path d="M-20 900 C 520 740 1000 930 1460 760 L1460 900 Z" fill="#123f2a" opacity="0.35"/>

  <!-- headings -->
  <text x="720" y="150" text-anchor="middle" class="d" font-size="44" font-weight="600" letter-spacing="18" fill="#4f8f6f">PROPONHA MERCADOS</text>
  <text x="720" y="300" text-anchor="middle" class="d" font-size="150" font-weight="800" fill="url(#price)">R$ 0,50</text>
  <text x="720" y="382" text-anchor="middle" class="d" font-size="60" font-weight="800" fill="#ffffff">POR CADA MERCADO ACEITO!</text>

  <!-- app icon -->
  <rect x="620" y="438" width="200" height="200" rx="46" fill="#0a1810" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="666" y="466" width="108" height="108" rx="28" fill="url(#icon)"/>
  <g transform="translate(720,520)" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-26 16 L-8 -4 L6 8 L26 -16"/>
    <path d="M12 -16 L26 -16 L26 -2"/>
  </g>
  <text x="720" y="610" text-anchor="middle" class="d" font-size="22" font-weight="700"><tspan fill="#ffffff">Previx</tspan><tspan fill="#37d67a">Lance</tspan></text>

  <!-- subtitle -->
  <text x="720" y="720" text-anchor="middle" class="d" font-size="42" font-weight="500" fill="#cfe8db">Proponha mercados e ganhe <tspan fill="#37d67a" font-weight="700">R$ 0,50</tspan> em sua carteira por</text>
  <text x="720" y="778" text-anchor="middle" class="d" font-size="42" font-weight="500" fill="#cfe8db">cada sugestão aprovada pela nossa equipe.</text>
</g>
<rect x="6" y="6" width="1428" height="888" rx="34" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>
</svg>
